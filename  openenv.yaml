# openenv.yaml — OpenEnv specification for HospitalSchedulingEnv
# Tested with: openenv validate

name: HospitalSchedulingEnv
version: "1.0.0"
description: >
  A real-world hospital scheduling environment where an AI agent assigns patients
  to doctors and rooms across time slots in a single hospital day (8 hours / 16 slots).
  The agent must respect department constraints, room type requirements, patient
  priorities, and hard deadlines while maximising priority-weighted scheduling coverage.

author: hospital-env
license: MIT
tags: [healthcare, scheduling, operations-research, real-world, multi-constraint, openenv]

# ── HTTP API (required for HF Space validation) ───────────────────────────

endpoints:
  health: GET  /health
  reset:  POST /reset
  step:   POST /step
  state:  GET  /state
  tasks:  GET  /tasks
  grade:  POST /grade

server:
  port: 7860
  framework: fastapi

# ── OpenEnv API ───────────────────────────────────────────────────────────

api:
  reset: "POST /reset  { task: str, session_id: str } -> { observation, task, session_id }"
  step:  "POST /step   { patient_id, doctor_id, room_id, start_slot, session_id } -> { observation, reward, done, info }"
  state: "GET  /state  ?session_id=default -> { observation, session_id }"

# ── Action space ──────────────────────────────────────────────────────────

action_space:
  type: structured
  fields:
    patient_id:  { type: str,  description: "ID of the patient to schedule" }
    doctor_id:   { type: str,  description: "ID of the doctor to assign" }
    room_id:     { type: str,  description: "ID of the room to book" }
    start_slot:  { type: int,  description: "Time slot index 0–15 (0=08:00, 15=15:30, 30-min steps)" }

# ── Observation space ─────────────────────────────────────────────────────

observation_space:
  type: structured
  fields:
    patients:         { type: "List[Patient]",       description: "All patients with current assignment state" }
    doctors:          { type: "List[Doctor]",         description: "All doctors with remaining available_slots" }
    rooms:            { type: "List[Room]",           description: "All rooms with remaining available_slots" }
    schedule:         { type: "List[ScheduleEntry]",  description: "Confirmed bookings so far" }
    current_step:     { type: int,                    description: "Steps taken in this episode" }
    max_steps:        { type: int,                    description: "Budget before forced termination" }
    scheduled_count:  { type: int,                    description: "Number of patients assigned" }
    total_patients:   { type: int,                    description: "Total patients to schedule" }
    reward_so_far:    { type: float,                  description: "Cumulative reward in this episode" }
    done:             { type: bool,                   description: "True when episode is complete" }

# ── Reward ────────────────────────────────────────────────────────────────

reward:
  range: [-1.0, 2.0]
  per_step: true
  description: >
    Step reward = priority_weight (CRITICAL=1.0, HIGH=0.75, MEDIUM=0.5, LOW=0.25)
               + department_match_bonus  (+0.20 / -0.20)
               + room_type_match_bonus   (+0.10 / -0.10)
               + deadline_bonus          (+0.15 / -0.30)
               - conflict_penalty        (-0.50 for invalid actions)
    Episode-end bonus = 0.5×coverage + 0.5×priority_weighted_coverage

# ── Tasks ─────────────────────────────────────────────────────────────────

tasks:
  - id: easy
    description: "3 patients, 1 department (General), 1 doctor, 2 rooms. No deadlines."
    patients: 3
    doctors: 1
    rooms: 2
    departments: [general]
    has_deadlines: false
    max_steps: 9
    baseline_score: 1.0000
    target_score: 0.9

  - id: medium
    description: "6 patients, 3 departments, 3 doctors, 4 rooms, soft deadlines."
    patients: 6
    doctors: 3
    rooms: 4
    departments: [general, cardiology, orthopedics]
    has_deadlines: true
    deadline_type: soft
    max_steps: 18
    baseline_score: 1.0000
    target_score: 0.75

  - id: hard
    description: >
      10 patients across all 5 departments including Emergency and Pediatrics.
      Hard deadlines, ICU rooms, critical patients must be triaged first.
    patients: 10
    doctors: 5
    rooms: 9
    departments: [emergency, cardiology, orthopedics, pediatrics, general]
    has_deadlines: true
    deadline_type: hard
    has_critical_patients: true
    max_steps: 30
    baseline_score: 0.8750
    target_score: 0.60

# ── Grading ───────────────────────────────────────────────────────────────

grading:
  range: [0.0, 1.0]
  deterministic: true
  formula: >
    score = 0.35 × coverage
          + 0.35 × priority_weighted_coverage
          + 0.15 × compatibility
          + 0.15 × deadline_compliance
    (hard: additional -0.15 per unscheduled critical patient)

# ── Inference script ──────────────────────────────────────────────────────

inference:
  script: inference.py
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  log_format: "[START] / [STEP] / [END] structured JSON to stdout"
  max_runtime_minutes: 20

# ── Setup ─────────────────────────────────────────────────────────────────

setup:
  python: ">=3.9"
  install: "pip install -r requirements.txt"
  run_server:    "python server.py"
  run_inference: "python inference.py"
  run_baseline:  "python baseline/run_baseline.py --task all --verbose"
  docker_build:  "docker build -t hospital-env ."
  docker_run:    "docker run -p 7860:7860 hospital-env"